<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Analyse des SLA : indicateurs et tendance">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/><stop offset="1" stop-color="#13294B"/>
    </linearGradient>
    <pattern id="dotsS" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#bgS)"/>
  <rect width="640" height="360" fill="url(#dotsS)"/>

  <!-- gauge -->
  <g transform="translate(180,210)">
    <path d="M -86 0 A 86 86 0 0 1 86 0" fill="none" stroke="#22406A" stroke-width="16" stroke-linecap="round"/>
    <path d="M -86 0 A 86 86 0 0 1 60 -62" fill="none" stroke="#16A5A2" stroke-width="16" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="44" y2="-46" stroke="#CFEAE9" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="7" fill="#CFEAE9"/>
    <text x="0" y="-18" font-family="monospace" font-size="22" font-weight="700" fill="#16A5A2" text-anchor="middle">SLA</text>
    <text x="0" y="34" font-family="monospace" font-size="12" fill="#9FB0C6" text-anchor="middle">temps de résolution</text>
  </g>

  <!-- trend chart panel -->
  <g transform="translate(360,108)">
    <rect x="0" y="0" width="222" height="150" rx="14" fill="#13294B" stroke="#3A4E72" stroke-width="1.4"/>
    <!-- axes -->
    <line x1="24" y1="22" x2="24" y2="120" stroke="#445876" stroke-width="1.5"/>
    <line x1="24" y1="120" x2="198" y2="120" stroke="#445876" stroke-width="1.5"/>
    <!-- bars -->
    <rect x="40"  y="84"  width="18" height="36" rx="3" fill="#0E7C7B"/>
    <rect x="68"  y="66"  width="18" height="54" rx="3" fill="#0E7C7B"/>
    <rect x="96"  y="92"  width="18" height="28" rx="3" fill="#0E7C7B"/>
    <rect x="124" y="52"  width="18" height="68" rx="3" fill="#16A5A2"/>
    <rect x="152" y="74"  width="18" height="46" rx="3" fill="#0E7C7B"/>
    <!-- trend line -->
    <polyline points="49,78 77,60 105,86 133,46 161,68" fill="none" stroke="#CFEAE9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="133" cy="46" r="3.4" fill="#CFEAE9"/>
  </g>
</svg>
