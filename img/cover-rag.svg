<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chatbot RAG : récupération de documents et LLM">
  <defs>
    <linearGradient id="bgR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/><stop offset="1" stop-color="#13294B"/>
    </linearGradient>
    <pattern id="dotsR" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#bgR)"/>
  <rect width="640" height="360" fill="url(#dotsR)"/>

  <!-- doc stack -->
  <g>
    <rect x="58" y="118" width="92" height="118" rx="10" fill="#1B3358" opacity="0.6"/>
    <rect x="50" y="108" width="92" height="118" rx="10" fill="#22406A" opacity="0.8"/>
    <rect x="42" y="98" width="92" height="118" rx="10" fill="#13294B" stroke="#3A4E72" stroke-width="1.5"/>
    <rect x="58" y="120" width="60" height="5" rx="2.5" fill="#16A5A2"/>
    <rect x="58" y="134" width="48" height="4" rx="2" fill="#7E90A8"/>
    <rect x="58" y="146" width="56" height="4" rx="2" fill="#7E90A8"/>
    <rect x="58" y="158" width="44" height="4" rx="2" fill="#7E90A8"/>
    <text x="88" y="206" font-family="monospace" font-size="12" fill="#9FB0C6" text-anchor="middle">base docs</text>
  </g>

  <!-- retrieval node -->
  <line x1="150" y1="162" x2="246" y2="162" stroke="#16A5A2" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round"/>
  <g>
    <circle cx="300" cy="162" r="46" fill="none" stroke="#0E7C7B" stroke-width="2.5"/>
    <circle cx="296" cy="158" r="20" fill="none" stroke="#CFEAE9" stroke-width="3"/>
    <line x1="310" y1="172" x2="326" y2="188" stroke="#CFEAE9" stroke-width="4" stroke-linecap="round"/>
    <text x="300" y="232" font-family="monospace" font-size="12" fill="#9FB0C6" text-anchor="middle">retrieval</text>
  </g>

  <!-- LLM chip -->
  <line x1="346" y1="162" x2="408" y2="162" stroke="#16A5A2" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round"/>
  <g>
    <rect x="412" y="124" width="76" height="76" rx="14" fill="#0E7C7B"/>
    <text x="450" y="170" font-family="monospace" font-size="20" fill="#CFEAE9" text-anchor="middle">LLM</text>
    <line x1="412" y1="142" x2="400" y2="142" stroke="#16A5A2" stroke-width="3"/>
    <line x1="412" y1="162" x2="400" y2="162" stroke="#16A5A2" stroke-width="3"/>
    <line x1="412" y1="182" x2="400" y2="182" stroke="#16A5A2" stroke-width="3"/>
    <line x1="500" y1="142" x2="488" y2="142" stroke="#16A5A2" stroke-width="3"/>
    <line x1="500" y1="162" x2="488" y2="162" stroke="#16A5A2" stroke-width="3"/>
    <line x1="500" y1="182" x2="488" y2="182" stroke="#16A5A2" stroke-width="3"/>
  </g>

  <!-- chat bubble answer -->
  <g>
    <rect x="430" y="232" width="150" height="58" rx="16" fill="#13294B" stroke="#16A5A2" stroke-width="1.6"/>
    <path d="M452 290 l0 18 l18 -18 z" fill="#13294B"/>
    <rect x="448" y="250" width="92" height="5" rx="2.5" fill="#CFEAE9"/>
    <rect x="448" y="264" width="116" height="5" rx="2.5" fill="#7E90A8"/>
  </g>
</svg>
