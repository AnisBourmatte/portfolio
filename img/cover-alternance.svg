<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alternance Support Cloud IT : cloud, automatisation, supervision">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/><stop offset="1" stop-color="#13294B"/>
    </linearGradient>
    <pattern id="dotsA" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#bgA)"/>
  <rect width="640" height="360" fill="url(#dotsA)"/>

  <!-- cloud -->
  <g transform="translate(150,150)">
    <path d="M -70 30 a 34 34 0 0 1 6 -67 a 40 40 0 0 1 76 -8 a 30 30 0 0 1 14 75 z"
          fill="#13294B" stroke="#16A5A2" stroke-width="2.5"/>
    <circle cx="-24" cy="-2" r="5" fill="#16A5A2"/>
    <circle cx="0" cy="6" r="5" fill="#0E7C7B"/>
    <circle cx="24" cy="-4" r="5" fill="#16A5A2"/>
    <text x="0" y="62" font-family="monospace" font-size="12" fill="#9FB0C6" text-anchor="middle">environnements cloud</text>
  </g>

  <!-- automation gear -->
  <g transform="translate(370,118)">
    <g fill="none" stroke="#16A5A2" stroke-width="3" stroke-linecap="round">
      <circle cx="0" cy="0" r="22"/>
      <line x1="0" y1="-34" x2="0" y2="-26"/><line x1="0" y1="26" x2="0" y2="34"/>
      <line x1="-34" y1="0" x2="-26" y2="0"/><line x1="26" y1="0" x2="34" y2="0"/>
      <line x1="-24" y1="-24" x2="-18" y2="-18"/><line x1="18" y1="18" x2="24" y2="24"/>
      <line x1="24" y1="-24" x2="18" y2="-18"/><line x1="-18" y1="18" x2="-24" y2="24"/>
    </g>
    <text x="0" y="6" font-family="monospace" font-size="12" fill="#CFEAE9" text-anchor="middle">.py</text>
    <text x="0" y="64" font-family="monospace" font-size="12" fill="#9FB0C6" text-anchor="middle">automatisation</text>
  </g>

  <!-- monitoring screen -->
  <g transform="translate(470,212)">
    <rect x="0" y="0" width="124" height="84" rx="11" fill="#13294B" stroke="#3A4E72" stroke-width="1.4"/>
    <polyline points="14,58 32,40 50,52 68,28 86,46 104,22" fill="none" stroke="#16A5A2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="104" cy="22" r="3.2" fill="#CFEAE9"/>
    <rect x="14" y="66" width="40" height="5" rx="2.5" fill="#445876"/>
    <text x="62" y="112" font-family="monospace" font-size="12" fill="#9FB0C6" text-anchor="middle">supervision</text>
  </g>

  <!-- connecting dotted lines -->
  <g stroke="#16A5A2" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round" opacity="0.7">
    <line x1="232" y1="150" x2="338" y2="124"/>
    <line x1="372" y1="158" x2="500" y2="218"/>
  </g>
</svg>
